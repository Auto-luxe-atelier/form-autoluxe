<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auto Luxe Atelier</title>

<link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
padding:20px;
margin:0;
}

.container{
max-width:650px;
margin:auto;
background:#1a1a1a;
padding:30px;
border-radius:12px;
border:2px solid #ffd000;
}

h2{
text-align:center;
color:#ffd000;
}

label{
font-weight:bold;
color:#ffd000;
display:block;
margin-top:15px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:6px;
border-radius:6px;
border:1px solid #444;
background:#111;
color:white;
}

button{
background:#ffd000;
color:black;
padding:14px;
border:none;
width:100%;
border-radius:6px;
font-size:16px;
font-weight:bold;
margin-top:20px;
cursor:pointer;
}

/* correction couleur tomselect */

.ts-control{
background:#111 !important;
color:white !important;
border:1px solid #444 !important;
}

.ts-dropdown{
background:#111 !important;
color:white !important;
}

/* SERVICES STYLE */

.services{
margin-top:10px;
}

.service-row{

display:flex;
align-items:center;
gap:10px;

border:1px solid #444;
padding:12px;
border-radius:6px;
margin-bottom:8px;

cursor:pointer;
transition:0.2s;
}

.service-row:hover{
border-color:#ffd000;
}

.service-row input{
display:none;
}

.service-box{

width:18px;
height:18px;

border:2px solid #ffd000;

border-radius:3px;

}

.service-row.active .service-box{

background:#ffd000;

}

</style>

</head>

<body>

<div class="container">

<h2>Nouveau client</h2>

<form id="form">

<label>Marque</label> <select id="marque"></select>

<label>Modèle</label> <select id="modele"></select>

<label>Année</label> <select id="annee"></select>

<label>Matricule</label> <input id="matricule">

<label>Services</label>

<div class="services">

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Rénovation ciel de toit">
Rénovation ciel de toit
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Rideau toit ouvrant">
Rideau toit ouvrant
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Changement couleur">
Changement couleur ciel de toit
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Alcantara">
Alcantara
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Tissu portes">
Rénovation tissu portes
</div>

<div class="service-row">
<div class="service-box"></div>
<input type="checkbox" value="Ciel étoilé">
Ciel étoilé
</div>

</div>

<label>Remarques</label>

<textarea id="remarques"></textarea>

<label>Prénom</label> <input id="prenom">

<label>Nom</label> <input id="nom">

<label>Téléphone</label> <input id="tel">

<label>Prix</label> <input id="prix">

<button type="submit">Ajouter client</button>

</form>

</div>

<script>

document.querySelectorAll(".service-row").forEach(row=>{

row.onclick=()=>{

row.classList.toggle("active")

const checkbox=row.querySelector("input")

checkbox.checked=!checkbox.checked

}

})

</script>

</body>

</html>
